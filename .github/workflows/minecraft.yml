name: Generate Minecraft Commits SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "scripts/generate_svg.py"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVG
        run: python scripts/generate_svg.py

      - name: Commit and push SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/minecraft-commits.svg
          git diff --cached --quiet || git commit -m "chore: regenerate minecraft commits SVG [skip ci]"
          git push